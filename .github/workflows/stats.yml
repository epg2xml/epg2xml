name: stats

on:
  workflow_dispatch:
    inputs:
      numChannels:
        description: 'Number of test channels'
        required: true
        default: '0'
      shuffle:
        description: 'Shuffle test channels'
        required: true
        default: 'false'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      providers_json: ${{ steps.providers.outputs.providers_json }}
    steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[all]
    - name: Export provider matrix
      id: providers
      run: |
        providers_json="$(
          python3 -c 'import json; from epg2xml.providers.all import PROVIDERS; print(json.dumps([provider.name for provider in PROVIDERS]))'
        )"
        echo "providers_json=$providers_json" >> "$GITHUB_OUTPUT"

  stats:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJson(needs.prepare.outputs.providers_json) }}
        python-version: ['3.8', '3.14']
    steps:
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Checkout
      uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[all]
        sudo apt-get install -y xmltv-util
    - name: Test ${{ matrix.provider }}
      run: |
        HTTP_PROXY="${{ secrets.HTTP_PROXY }}" \
        HTTPS_PROXY="${{ secrets.HTTP_PROXY }}" \
        python -m scripts.check_provider \
          ${{ matrix.provider }} \
          ${{ github.event.inputs.numChannels }} \
          ${{ github.event.inputs.shuffle }}
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: xmltv-${{ matrix.provider }}-py${{ matrix.python-version }}
        path: xmltv_${{ matrix.provider }}.xml
